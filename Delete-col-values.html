<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پاک‌سازی و حذف مقادیر خاص از ستون‌های اکسل</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-rose-600 text-white shadow-md py-5 px-8 mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">ابزار پاک‌سازی هوشمند سلول‌های اکسل</h1>
            <span class="text-xs bg-rose-500 px-3 py-1 rounded-full text-rose-100 font-mono">Version 1.0 (Value Clearer)</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 w-full flex-grow flex flex-col gap-6">
        
        <section class="bg-white p-5 rounded-xl shadow-xs border border-gray-100">
            <h2 class="text-md font-bold mb-3 text-gray-700">۱. بارگذاری فایل اکسل اولیه</h2>
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-gray-200 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                    <div class="flex flex-col items-center justify-center pt-4 pb-4">
                        <p class="mb-1 text-sm text-gray-500"><span class="font-bold">انتخاب فایل اکسل</span> یا کشیدن آن به این مکان</p>
                        <p class="text-xs text-gray-400">XLSX, XLS</p>
                    </div>
                    <input id="excel-file" type="file" class="hidden" accept=".xlsx, .xls" />
                </label>
            </div>
            <div id="file-info" class="mt-2 text-sm text-rose-600 hidden font-medium"></div>
        </section>

        <section id="config-section" class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 hidden">
            <h2 class="text-md font-bold mb-4 text-gray-700">۲. انتخاب ستون و مقدار جهت پاک‌سازی</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                <div>
                    <label class="block mb-1.5 text-xs font-bold text-gray-600">ستون مورد نظر را انتخاب کنید:</label>
                    <select id="col-select" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-rose-500 focus:border-rose-500 block w-full p-2.5">
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block mb-1.5 text-xs font-bold text-gray-600">مقادیر منحصربه‌فرد موجود در این ستون (یکی را جهت حذف انتخاب کنید):</label>
                    <div id="unique-values-container" class="border border-gray-200 rounded-lg p-3 bg-gray-50 max-h-40 overflow-y-auto flex flex-wrap gap-2">
                        <span class="text-xs text-gray-400">ابتدا فایل را آپلود کنید...</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-5 pt-4 border-t border-gray-100">
                <button id="btn-clear" class="bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 px-6 rounded-lg text-sm transition shadow-xs cursor-pointer">
                    حذف و پاک‌سازی مقادیر انتخاب شده
                </button>
                <button id="btn-export" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-6 rounded-lg text-sm transition shadow-xs cursor-pointer hidden">
                    دانلود اکسل اصلاح‌شده (Export)
                </button>
            </div>
        </section>

        <section id="preview-section" class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 flex-grow hidden flex flex-col">
            <h2 class="text-md font-bold mb-3 text-gray-700">پیش‌نمایش زنده داده‌ها</h2>
            <div class="overflow-x-auto border border-gray-100 rounded-lg flex-grow max-h-[350px]">
                <table class="w-full text-sm text-right text-gray-500">
                    <thead id="table-head" class="text-xs text-gray-700 uppercase bg-gray-100 sticky top-0 z-10">
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-150">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="bg-gray-100 text-center py-3 text-xs text-gray-400 border-t border-gray-200 mt-6">
        سامانه فرانت‌اند حذف اتمیک داده‌های تکرار شونده در ستون‌های مجزا.
    </footer>

    <script>
        // وضعیت مرکزی برنامه
        const AppState = {
            rawData: [],
            processedData: [],
            headers: [],
            fileName: ""
        };

        // المان‌های DOM
        const fileInput = document.getElementById('excel-file');
        const fileInfo = document.getElementById('file-info');
        const configSection = document.getElementById('config-section');
        const previewSection = document.getElementById('preview-section');
        const colSelect = document.getElementById('col-select');
        const uniqueValuesContainer = document.getElementById('unique-values-container');
        const btnClear = document.getElementById('btn-clear');
        const btnExport = document.getElementById('btn-export');
        const tableHead = document.getElementById('table-head');
        const tableBody = document.getElementById('table-body');

        // تعریف لیسنرها
        fileInput.addEventListener('change', handleFileUpload);
        colSelect.addEventListener('change', extractUniqueValues);
        btnClear.addEventListener('click', executeClearValue);
        btnExport.addEventListener('click', exportExcel);

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            AppState.fileName = file.name;
            fileInfo.textContent = `فایل دریافت شد: ${file.name}`;
            fileInfo.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheet];
                
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                
                if (jsonData.length === 0) {
                    alert("فایل فاقد داده معتبر است.");
                    return;
                }

                AppState.rawData = JSON.parse(JSON.stringify(jsonData));
                AppState.processedData = JSON.parse(JSON.stringify(jsonData));
                AppState.headers = Object.keys(jsonData[0]);

                populateColumnsDropdown();
                extractUniqueValues();
                renderTable(AppState.rawData);

                configSection.classList.remove('hidden');
                previewSection.classList.remove('hidden');
                btnExport.classList.add('hidden');
            };
            reader.readAsArrayBuffer(file);
        }

        function populateColumnsDropdown() {
            colSelect.innerHTML = '';
            AppState.headers.forEach(header => {
                colSelect.add(new Option(header, header));
            });
        }

        // استخراج و نمایش مقادیر منحصر به فرد ستون انتخاب شده
        function extractUniqueValues() {
            const targetColumn = colSelect.value;
            if (!targetColumn) return;

            const uniqueSet = new Set();
            AppState.rawData.forEach(row => {
                const val = String(row[targetColumn]).trim();
                if (val !== "") {
                    uniqueSet.add(val);
                }
            });

            uniqueValuesContainer.innerHTML = '';
            
            if (uniqueSet.size === 0) {
                uniqueValuesContainer.innerHTML = '<span class="text-xs text-gray-400">هیچ مقداری در این ستون یافت نشد.</span>';
                return;
            }

            uniqueSet.forEach(value => {
                // ساخت یک المان رادیویی تعاملی برای انتخاب آسان مقدار مورد نظر جهت حذف
                const label = document.createElement('label');
                label.className = "flex items-center gap-1.5 bg-white border border-gray-200 px-3 py-1 rounded-md text-xs cursor-pointer hover:border-rose-400 transition select-none";
                
                label.innerHTML = `
                    <input type="radio" name="unique-value-target" value="${value}" class="text-rose-600 focus:ring-rose-500">
                    <span class="text-gray-700">${value}</span>
                `;
                uniqueValuesContainer.appendChild(label);
            });
        }

        function renderTable(data) {
            tableHead.innerHTML = '<tr>';
            AppState.headers.forEach(h => {
                tableHead.innerHTML += `<th class="px-6 py-2.5 font-bold text-gray-700 bg-gray-100">${h}</th>`;
            });
            tableHead.innerHTML += '</tr>';

            tableBody.innerHTML = '';
            data.forEach(row => {
                let rowHtml = '<tr class="bg-white hover:bg-gray-50 transition border-b border-gray-100">';
                AppState.headers.forEach(h => {
                    rowHtml += `<td class="px-6 py-2.5 text-gray-900 font-medium">${row[h] !== undefined ? row[h] : ''}</td>`;
                });
                rowHtml += '</tr>';
                tableBody.innerHTML += rowHtml;
            });
        }

        // الگوریتم اتمیک حذف مقادیر هدف از ستون انتخابی
        function executeClearValue() {
            const targetColumn = colSelect.value;
            const selectedRadio = document.querySelector('input[name="unique-value-target"]:checked');

            if (!selectedRadio) {
                alert("لطفاً ابتدا مقداری که قصد پاک‌سازی آن را دارید از لیست انتخاب کنید.");
                return;
            }

            const valueToClear = selectedRadio.value;

            // عملیات مپینگ معکوس: پاک کردن فیلد منطبق و حفظ کامل سایر داده‌ها
            AppState.processedData = AppState.rawData.map(row => {
                const updatedRow = { ...row };
                if (String(updatedRow[targetColumn]).trim() === valueToClear) {
                    updatedRow[targetColumn] = ""; // تخلیه سلول هدف
                }
                return updatedRow;
            });

            renderTable(AppState.processedData);
            btnExport.classList.remove('hidden');
            alert(`تمام مقادیر "${valueToClear}" در ستون "${targetColumn}" با موفقیت پاک شدند.`);
        }

        function exportExcel() {
            if (AppState.processedData.length === 0) return;

            const worksheet = XLSX.utils.json_to_sheet(AppState.processedData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Cleaned_Data");

            const finalName = `cleaned_${AppState.fileName || 'document.xlsx'}`;
            XLSX.writeFile(workbook, finalName);
        }
    </script>
</body>
</html>
