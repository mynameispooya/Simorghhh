<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحلیلگر گیت تردد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e18;
            --bg2: #101525;
            --card: #151c30;
            --card-hover: #1b2442;
            --accent: #e07a5f;
            --accent-dim: rgba(224,122,95,0.15);
            --accent-glow: rgba(224,122,95,0.25);
            --fg: #eae6df;
            --fg2: #c8c3bb;
            --muted: #5e6480;
            --border: #232c4a;
            --success: #34d399;
            --danger: #f87171;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

        /* پس‌زمینه متحرک */
        .bg-blob{position:fixed;border-radius:50%;filter:blur(140px);opacity:.12;pointer-events:none;z-index:0}
        .blob-1{width:650px;height:650px;background:var(--accent);top:-250px;right:-180px;animation:bFloat 22s ease-in-out infinite}
        .blob-2{width:450px;height:450px;background:#5f8ae0;bottom:-150px;left:-120px;animation:bFloat 28s ease-in-out infinite reverse}
        .blob-3{width:300px;height:300px;background:#a35fe0;top:50%;left:50%;transform:translate(-50%,-50%);animation:bFloat 18s ease-in-out infinite 5s}
        @keyframes bFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.12)}66%{transform:translate(-40px,60px) scale(.9)}}

        /* نوار پیشرفت بالای صفحه */
        .top-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:300;background:var(--border);overflow:hidden}
        .top-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f4a583);width:0;transition:width .6s cubic-bezier(.4,0,.2,1)}

        /* زون آپلود */
        .upload-zone{border:2px dashed var(--border);border-radius:20px;padding:70px 40px;text-align:center;cursor:pointer;transition:all .35s ease;position:relative;overflow:hidden;background:var(--bg2)}
        .upload-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--accent-glow),transparent 70%);opacity:0;transition:opacity .35s}
        .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 16px 50px rgba(0,0,0,.35)}
        .upload-zone:hover::before,.upload-zone.drag-over::before{opacity:1}
        .upload-zone.drag-over{box-shadow:0 16px 50px rgba(0,0,0,.35),0 0 60px var(--accent-glow)}
        .upload-icon{animation:iconPulse 2.5s ease-in-out infinite}
        @keyframes iconPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.08);opacity:1}}

        /* کارت آمار */
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 18px;text-align:center;transition:all .3s ease;position:relative;overflow:hidden}
        .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .4s ease;transform-origin:center}
        .stat-card:hover{border-color:rgba(224,122,95,.3);transform:translateY(-2px)}
        .stat-card:hover::after{transform:scaleX(1)}

        /* کارت گیت */
        .gate-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;opacity:0;animation:cardIn .5s ease forwards}
        .gate-card::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;background:radial-gradient(circle,var(--accent-dim),transparent 70%);opacity:0;transition:opacity .3s}
        .gate-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#f4a583);transform:scaleX(0);transition:transform .35s ease;transform-origin:right}
        .gate-card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-5px);box-shadow:0 16px 50px rgba(0,0,0,.45),0 0 30px var(--accent-glow)}
        .gate-card:hover::before{opacity:1}
        .gate-card:hover::after{transform:scaleX(1)}
        .gate-card:active{transform:translateY(-2px)}
        @keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

        /* مودال */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;padding:16px}
        .modal-overlay.active{opacity:1;pointer-events:all}
        .modal-content{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:860px;max-height:85vh;overflow:hidden;transform:translateY(40px) scale(.96);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
        .modal-overlay.active .modal-content{transform:translateY(0) scale(1)}

        /* جدول */
        .data-table{width:100%;border-collapse:separate;border-spacing:0}
        .data-table thead th{background:rgba(224,122,95,.08);padding:14px 18px;text-align:right;font-weight:700;font-size:13px;color:var(--accent);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;white-space:nowrap}
        .data-table tbody tr{transition:background .2s;opacity:0;animation:rowIn .35s ease forwards}
        .data-table tbody tr:hover{background:rgba(224,122,95,.04)}
        .data-table tbody td{padding:13px 18px;border-bottom:1px solid rgba(35,44,74,.6);font-size:14px}
        @keyframes rowIn{to{opacity:1}}

        /* تست */
        .toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
        .toast{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:12px;font-size:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:tIn .4s ease,tOut .4s ease 2.8s forwards;pointer-events:all;backdrop-filter:blur(12px)}
        @keyframes tIn{from{transform:translateY(-24px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes tOut{from{opacity:1}to{transform:translateY(-24px);opacity:0}}

        /* اسپینر */
        .spinner{width:52px;height:52px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* دکمه‌ها */
        .btn-accent{background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:8px}
        .btn-accent:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 20px var(--accent-glow)}
        .btn-accent:active{transform:translateY(0)}
        .btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--border);padding:10px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s
