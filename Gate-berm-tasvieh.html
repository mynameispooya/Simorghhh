<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصال محل فعالیت به گیت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--bg:#07090f;--bg2:#0d1117;--card:#151b28;--card2:#1a2234;--accent:#f97316;--accent-dim:rgba(249,115,22,.1);--accent-glow:rgba(249,115,22,.2);--green:#22c55e;--green-dim:rgba(34,197,94,.1);--red:#ef4444;--red-dim:rgba(239,68,68,.08);--yellow:#eab308;--yellow-dim:rgba(234,179,8,.1);--fg:#e8ecf2;--fg2:#a8b4c4;--muted:#4a5568;--border:#1e293b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
        .bg-glow{position:fixed;border-radius:50%;filter:blur(160px);opacity:.08;pointer-events:none;z-index:0}
        .g1{width:600px;height:600px;background:var(--accent);top:-200px;right:-150px;animation:gf 25s ease-in-out infinite}
        .g2{width:400px;height:400px;background:#3b82f6;bottom:-100px;left:-100px;animation:gf 30s ease-in-out infinite reverse}
        @keyframes gf{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}}
        .top-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:300;background:var(--border);overflow:hidden}
        .top-fill{height:100%;background:linear-gradient(90deg,var(--accent),#fbbf24);width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
        .step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;transition:all .3s}
        .step-num.active{background:var(--accent);color:#000;box-shadow:0 0 16px var(--accent-glow)}
        .step-num.done{background:var(--green);color:#fff}
        .step-num.pending{background:var(--card);color:var(--muted);border:1px solid var(--border)}
        .step-line{height:2px;flex:1;background:var(--border);position:relative;overflow:hidden;min-width:20px}
        .step-line .fill{position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:right;transition:transform .5s ease}
        .step-line.filled .fill{transform:scaleX(1)}
        .upload-card{border:2px dashed var(--border);border-radius:16px;padding:36px 24px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;background:var(--bg2)}
        .upload-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--accent-glow),transparent 70%);opacity:0;transition:opacity .3s}
        .upload-card:hover,.upload-card.drag-over{border-color:var(--accent);transform:translateY(-2px)}
        .upload-card:hover::before,.upload-card.drag-over::before{opacity:1}
        .upload-card.loaded{border-color:var(--accent);border-style:solid;background:rgba(249,115,22,.03)}
        .upload-card.loaded::before{opacity:.4}
        .col-sel{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-family:inherit;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s;min-width:140px;width:100%}
        .col-sel:focus{border-color:var(--accent)}
        .col-sel option{background:var(--card);color:var(--fg)}
        .mini-tbl{width:100%;border-collapse:collapse;font-size:11px}
        .mini-tbl th{background:rgba(249,115,22,.07);padding:6px 8px;text-align:right;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);white-space:nowrap}
        .mini-tbl td{padding:5px 8px;border-bottom:1px solid rgba(30,41,59,.5);color:var(--fg2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .result-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
        .result-table thead th{background:rgba(249,115,22,.06);padding:12px 14px;text-align:right;font-weight:800;font-size:12px;color:var(--accent);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap}
        .result-table tbody td{padding:10px 14px;border-bottom:1px solid rgba(30,41,59,.4);color:var(--fg2);transition:background .15s}
        .result-table tbody tr:hover td{background:rgba(255,255,255,.015)}
        .result-table .row-matched td{border-right:3px solid var(--green)}
        .result-table .row-missing td{border-right:3px solid var(--red);background:var(--red-dim)}
        .result-table .row-noinfo td{border-right:3px solid var(--yellow);background:var(--yellow-dim)}
        .result-table .col-new{color:var(--accent);font-weight:700}
        .result-table .col-strike{color:var(--red);text-decoration:line-through;opacity:.8}
        .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:800}
        .badge-green{background:var(--green-dim);color:var(--green)}
        .badge-red{background:var(--red-dim);color:var(--red)}
        .badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
        .btn-main{background:var(--accent);color:#000;border:none;padding:12px 28px;border-radius:14px;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:10px}
        .btn-main:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow)}
        .btn-main:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;box-shadow:none!important}
        .btn-sec{background:var(--card);color:var(--fg2);border:1px solid var(--border);padding:10px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:8px}
        .btn-sec:hover{border-color:var(--accent);color:var(--fg)}
        .toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
        .toast{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 20px;display:flex;align-items:center;gap:11px;font-size:14px;box-shadow:0 12px 40px rgba(0,0,0,.55);animation:tIn .3s ease,tOut .3s ease 2.6s forwards;pointer-events:all}
        @keyframes tIn{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes tOut{from{opacity:1}to{transform:translateY(-18px);opacity:0}}
        .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        .fade-in{animation:fi .45s ease forwards}
        @keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .tab-btn{padding:8px 16px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
        .tab-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(249,115,22,.15)}
        .tab-btn:hover:not(.active){color:var(--fg2)}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        @media(max-width:768px){.upload-pair{flex-direction:column!important}.arrow-v{transform:rotate(90deg)}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="top-bar"><div class="top-fill" id="topFill"></div></div>
    <div class="toast-wrap" id="toastWrap"></div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <header class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-3">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),#dc6a0a);box-shadow:0 4px 20px var(--accent-glow)">
                    <i class="fas fa-object-group text-white text-xl"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-black">اتصال محل فعالیت به گیت</h1>
            </div>
            <p class="text-sm max-w-md mx-auto" style="color:var(--muted)">واحد سازمانی و زیرمجموعه را از فایل محل فعالیت به فایل گیت متصل کنید</p>
        </header>

        <nav class="flex items-center justify-center gap-0 mb-10 px-4 max-w-lg mx-auto" id="stepNav">
            <div class="step-num active" id="sn1">1</div>
            <div class="step-line" id="sl1"><div class="fill"></div></div>
            <div class="step-num pending" id="sn2">2</div>
            <div class="step-line" id="sl2"><div class="fill"></div></div>
            <div class="step-num pending" id="sn3">3</div>
        </nav>

        <!-- مرحله ۱ -->
        <section id="step1">
            <div class="upload-pair flex gap-5 items-stretch mb-6" style="flex-direction:row">
                <div class="flex-1">
                    <p class="text-xs font-bold mb-2 flex items-center gap-2" style="color:var(--accent)"><i class="fas fa-building"></i> فایل محل فعالیت</p>
                    <div class="upload-card" id="box1" role="button" tabindex="0" aria-label="آپلود فایل محل فعالیت">
                        <input type="file" id="file1" accept=".xlsx,.xls" class="hidden">
                        <div class="relative z-10">
                            <i class="fas fa-file-alt text-3xl mb-3 block" style="color:var(--accent);opacity:.4" id="ic1"></i>
                            <p class="font-bold text-sm mb-1" id="t1">کلیک یا بکشید و رها کنید</p>
                            <p class="text-xs" style="color:var(--muted)" id="s1">شامل: کدپرسنلی، نام، واحد، زیرمجموعه</p>
                        </div>
                    </div>
                </div>
                <div class="flex items-center arrow-v"><i class="fas fa-arrow-left text-xl" style="color:var(--muted)"></i></div>
                <div class="flex-1">
                    <p class="text-xs font-bold mb-2 flex items-center gap-2" style="color:var(--accent)"><i class="fas fa-door-open"></i> فایل گیت</p>
                    <div class="upload-card" id="box2" role="button" tabindex="0" aria-label="آپلود فایل گیت">
                        <input type="file" id="file2" accept=".xlsx,.xls" class="hidden">
                        <div class="relative z-10">
                            <i class="fas fa-door-open text-3xl mb-3 block" style="color:var(--accent);opacity:.4" id="ic2"></i>
                            <p class="font-bold text-sm mb-1" id="t2">کلیک یا بکشید و رها کنید</p>
                            <p class="text-xs" style="color:var(--muted)" id="s2">شامل: گیت، نام، کدپرسنلی</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center">
                <button class="btn-main" id="toStep2Btn" disabled><i class="fas fa-arrow-left"></i> تنظیم ستون‌ها</button>
            </div>
        </section>

        <!-- مرحله ۲ -->
        <section id="step2" class="hidden fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="rounded-2xl p-5" style="background:var(--card);border:1px solid var(--border)">
                    <h3 class="font-extrabold text-sm mb-4 flex items-center gap-2"><i class="fas fa-building" style="color:var(--accent)"></i> ستون‌های فایل محل فعالیت</h3>
                    <div class="space-y-3 mb-5">
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">کد پرسنلی <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel1Code"><option value="">-- انتخاب --</option></select></div>
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">نام و نام خانوادگی <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel1Name"><option value="">-- انتخاب --</option></select></div>
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">واحد سازمانی <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel1Unit"><option value="">-- انتخاب --</option></select></div>
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">زیرمجموعه <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel1Sub"><option value="">-- انتخاب --</option></select></div>
                    </div>
                    <div class="rounded-xl overflow-auto" style="max-height:180px;border:1px solid var(--border)"><table class="mini-tbl" id="prev1"><thead></thead><tbody></tbody></table></div>
                </div>
                <div class="rounded-2xl p-5" style="background:var(--card);border:1px solid var(--border)">
                    <h3 class="font-extrabold text-sm mb-4 flex items-center gap-2"><i class="fas fa-door-open" style="color:var(--accent)"></i> ستون‌های فایل گیت</h3>
                    <div class="space-y-3 mb-5">
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">گیت <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel2Gate"><option value="">-- انتخاب --</option></select></div>
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">نام و نام خانوادگی <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel2Name"><option value="">-- انتخاب --</option></select></div>
                        <div><label class="text-xs font-bold block mb-1" style="color:var(--fg2)">کد پرسنلی <span style="color:var(--red)">*</span></label><select class="col-sel" id="sel2Code"><option value="">-- انتخاب --</option></select></div>
                    </div>
                    <div class="rounded-xl overflow-auto" style="max-height:220px;border:1px solid var(--border)"><table class="mini-tbl" id="prev2"><thead></thead><tbody></tbody></table></div>
                </div>
            </div>
            <div class="flex justify-center gap-3">
                <button class="btn-sec" id="backStep1"><i class="fas fa-arrow-right"></i> مرحله قبل</button>
                <button class="btn-main" id="doMergeBtn"><i class="fas fa-code-merge"></i> اتصال و نمایش نتایج</button>
            </div>
        </section>

        <!-- مرحله ۳ -->
        <section id="step3" class="hidden fade-in">
            <div class="flex flex-wrap items-center justify-center gap-3 mb-6" id="statsBar"></div>
            <div class="flex flex-wrap items-center gap-2 mb-4">
                <button class="tab-btn active" data-filter="all" onclick="filterRows('all',this)">همه</button>
                <button class="tab-btn" data-filter="matched" onclick="filterRows('matched',this)"><span class="inline-block w-2 h-2 rounded-full ml-1" style="background:var(--green)"></span>تطبیق</button>
                <button class="tab-btn" data-filter="noinfo" onclick="filterRows('noinfo',this)"><span class="inline-block w-2 h-2 rounded-full ml-1" style="background:var(--yellow)"></span>بدون اطلاعات</button>
                <button class="tab-btn" data-filter="missing" onclick="filterRows('missing',this)"><span class="inline-block w-2 h-2 rounded-full ml-1" style="background:var(--red)"></span>فاقد تردد</button>
            </div>
            <div class="rounded-2xl overflow-hidden mb-6" style="border:1px solid var(--border);background:var(--card)">
                <div class="overflow-auto" style="max-height:56vh" id="resWrap">
                    <table class="result-table" id="resTable">
                        <thead id="resHead"></thead>
                        <tbody id="resBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="flex flex-wrap items-center justify-center gap-4">
                <button class="btn-main" id="dlBtn"><i class="fas fa-download"></i> دانلود فایل اکسل</button>
                <button class="btn-sec" id="backStep2"><i class="fas fa-redo-alt"></i> شروع مجدد</button>
            </div>
        </section>
    </div>

    <script>
    const S = { rows1:[], rows2:[], cols1:[], cols2:[], name1:'', name2:'', merged:[], headers:[] };
    const $ = id => document.getElementById(id);

    /* آپلود */
    function initUpload(boxId, fileId, idx) {
        const box = $(boxId), inp = $(fileId);
        box.addEventListener('click', () => inp.click());
        box.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();inp.click()} });
        box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('drag-over'); });
        box.addEventListener('dragleave', () => box.classList.remove('drag-over'));
        box.addEventListener('drop', e => { e.preventDefault(); box.classList.remove('drag-over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0], idx); });
        inp.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0], idx); });
    }
    initUpload('box1','file1',1);
    initUpload('box2','file2',2);

    function handleFile(file, idx) {
        if(!/\.xlsx?$/i.test(file.name)){toast('فقط فرمت xlsx/xls','error');return}
        bar(20);
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data,{type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
                if(idx===1){ S.rows1=rows; S.name1=file.name; S.cols1=rows[0]||[]; markLoaded(1,file.name,rows.length); }
                else { S.rows2=rows; S.name2=file.name; S.cols2=rows[0]||[]; markLoaded(2,file.name,rows.length); }
                bar(0); checkBoth();
            } catch(err){toast('خطا: '+err.message,'error');bar(0)}
        };
        reader.readAsArrayBuffer(file);
    }

    function markLoaded(idx, name, rc) {
        const box=$(idx===1?'box1':'box2'), ic=$(idx===1?'ic1':'ic2'), t=$(idx===1?'t1':'t2'), s=$(idx===1?'s1':'s2');
        box.classList.add('loaded');
        ic.className='fas fa-check-circle text-3xl mb-3 block'; ic.style.color='var(--accent)'; ic.style.opacity='1';
        t.textContent=name; s.textContent=rc+' ردیف';
    }

    function checkBoth(){ $('toStep2Btn').disabled=!(S.rows1.length&&S.rows2.length); }

    /* ناوبری */
    $('toStep2Btn').addEventListener('click',()=>{ if(goStep2()) showStep(2); });
    $('backStep1').addEventListener('click',()=>showStep(1));
    $('doMergeBtn').addEventListener('click', doMerge);
    $('backStep2').addEventListener('click',()=>{showStep(1);resetAll()});
    $('dlBtn').addEventListener('click', downloadExcel);

    function showStep(n) {
        $('step1').classList.toggle('hidden',n!==1);
        $('step2').classList.toggle('hidden',n!==2);
        $('step3').classList.toggle('hidden',n!==3);
        for(let i=1;i<=3;i++){
            const sn=$('sn'+i), sl=$('sl'+(i-1));
            sn.className='step-num '+(i<n?'done':i===n?'active':'pending');
            sn.innerHTML=i<n?'<i class="fas fa-check text-xs"></i>':i;
            if(sl) sl.classList.toggle('filled',i<=n);
        }
    }

    /* مرحله ۲ */
    function goStep2() {
        populateSelect('sel1Code', S.cols1, ['کدپرسنلی','کد پرسنلی','کد پرسنل','کد']);
        populateSelect('sel1Name', S.cols1, ['نام_و_نام_خانوادگی','نام و نام خانوادگی','نام و نام خانوادگي','نام و نام خانوادگی']);
        populateSelect('sel1Unit', S.cols1, ['واحد_سازمانی','واحد سازمانی','واحدسازمانی','واحد']);
        populateSelect('sel1Sub',  S.cols1, ['زیر_مجموعه','زیرمجموعه','زیر مجموعه','زیرمجموععه']);
        populateSelect('sel2Gate', S.cols2, ['گیت']);
        populateSelect('sel2Name', S.cols2, ['نام و نام خانوادگی','نام و نام خانوادگي','نام_و_نام_خانوادگی','نام']);
        populateSelect('sel2Code', S.cols2, ['کد پرسنلی','کدپرسنلی','کد پرسنل','کد']);
        renderMini('prev1', S.rows1, {code:'sel1Code',name:'sel1Name',unit:'sel1Unit',sub:'sel1Sub'});
        renderMini('prev2', S.rows2, {code:'sel2Code',name:'sel2Name',gate:'sel2Gate'});
        ['sel1Code','sel1Name','sel1Unit','sel1Sub'].forEach(id=>{
            const old = $(id).onchange;
            $(id).onchange = ()=> renderMini('prev1', S.rows1, {code:'sel1Code',name:'sel1Name',unit:'sel1Unit',sub:'sel1Sub'});
        });
        ['sel2Gate','sel2Name','sel2Code'].forEach(id=>{
            $(id).onchange = ()=> renderMini('prev2', S.rows2, {code:'sel2Code',name:'sel2Name',gate:'sel2Gate'});
        });
        return true;
    }

    function populateSelect(selId, cols, hints) {
        const sel=$(selId); sel.innerHTML='<option value="">-- انتخاب ستون --</option>';
        cols.forEach((c,i)=>{
            const v=clean(c);
            const opt=document.createElement('option');
            opt.value=i; opt.textContent=v||'(ستون '+( i+1)+')';
            if(hints.some(h=>v.includes(h))) opt.selected=true;
            sel.appendChild(opt);
        });
    }

    function renderMini(tblId, rows, selIds) {
        const tbl=$(tblId);
        const selectedCols={};
        for(const k in selIds){ const v=$(selIds[k]).value; if(v!=='') selectedCols[k]=parseInt(v); }
        const header=rows[0]||[];
        const thead=tbl.querySelector('thead');
        const tbody=tbl.querySelector('tbody');
        thead.innerHTML=''; tbody.innerHTML='';
        let trH=document.createElement('tr');
        header.forEach((c,ci)=>{
            const th=document.createElement('th'); th.textContent=clean(c)||'(ستون '+(ci+1)+')';
            if(Object.values(selectedCols).includes(ci)) th.style.background='rgba(249,115,22,.2)';
            trH.appendChild(th);
        });
        thead.appendChild(trH);
        for(let r=1;r<=Math.min(5,rows.length-1);r++){
            const tr=document.createElement('tr');
            header.forEach((_,ci)=>{
                const td=document.createElement('td'); td.textContent=clean(rows[r][ci]);
                if(Object.values(selectedCols).includes(ci)) td.style.background='rgba(249,115,22,.08)';
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        }
    }

    /* ادغام */
    function doMerge() {
        const c1=parseInt($('sel1Code').value), n1=parseInt($('sel1Name').value),
              u1=parseInt($('sel1Unit').value), s1=parseInt($('sel1Sub').value);
        const g2=parseInt($('sel2Gate').value), n2=parseInt($('sel2Name').value),
              c2=parseInt($('sel2Code').value);
        if([c1,n1,u1,s1].some(v=>isNaN(v))){toast('لطفاً تمام ستون‌های فایل محل فعالیت را انتخاب کنید.','error');return}
        if([g2,n2,c2].some(v=>isNaN(v))){toast('لطفاً تمام ستون‌های فایل گیت را انتخاب کنید.','error');return}
        bar(30);
        setTimeout(()=>{
            try {
                const map1={};
                for(let i=1;i<S.rows1.length;i++){
                    const row=S.rows1[i]||[];
                    const code=normD(clean(row[c1]));
                    if(code) map1[code]={name:clean(row[n1]),unit:clean(row[u1]),sub:clean(row[s1]),code};
                }
                bar(50);
                S.merged=[];
                const codesIn2=new Set();
                for(let i=1;i<S.rows2.length;i++){
                    const row=S.rows2[i]||[];
                    const code=normD(clean(row[c2]));
                    const name=clean(row[n2]);
                    const gate=clean(row[g2]);
                    if(!code) continue;
                    codesIn2.add(code);
                    const info=map1[code];
                    if(info) S.merged.push({gate,name:name||info.name,code,unit:info.unit,sub:info.sub,type:'matched'});
                    else S.merged.push({gate,name,code,unit:'—',sub:'—',type:'noinfo'});
                }
                bar(75);
                for(const code in map1){
                    if(!codesIn2.has(code)){
                        const info=map1[code];
                        S.merged.push({gate:'—',name:info.name,code,unit:info.unit,sub:info.sub,type:'missing'});
                    }
                }
                bar(90);
                S.headers=['ردیف','گیت','نام و نام خانوادگی','کد پرسنلی','واحد سازمانی','زیرمجموعه','وضعیت'];
                renderResults();
                bar(100); setTimeout(()=>bar(0),500);
                showStep(3);
                toast('ادغام با موفقیت انجام شد.','success');
            } catch(err){toast('خطا: '+err.message,'error');bar(0);console.error(err)}
        },80);
    }

    /* نتایج */
    function renderResults() {
        const matched=S.merged.filter(r=>r.type==='matched').length;
        const noinfo=S.merged.filter(r=>r.type==='noinfo').length;
        const missing=S.merged.filter(r=>r.type==='missing').length;
        const total=S.merged.length;
        $('statsBar').innerHTML=
            '<div class="badge badge-green"><i class="fas fa-check-circle"></i> تطبیق: '+matched+'</div>'+
            '<div class="badge badge-yellow"><i class="fas fa-question-circle"></i> بدون اطلاعات: '+noinfo+'</div>'+
            '<div class="badge badge-red"><i class="fas fa-times-circle"></i> فاقد تردد: '+missing+'</div>'+
            '<div class="badge" style="background:var(--accent-dim);color:var(--fg2)"><i class="fas fa-list"></i> کل: '+total+'</div>';
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter==='all'));
        renderFilteredRows('all');
    }

    function filterRows(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderFilteredRows(type);
    }

    function renderFilteredRows(type) {
        const head=$('resHead'), body=$('resBody');
        head.innerHTML=''; body.innerHTML='';
        let data=type==='all'?S.merged:S.merged.filter(r=>r.type===type);
        let trH=document.createElement('tr');
        S.headers.forEach(h=>{ const th=document.createElement('th'); th.textContent=h; trH.appendChild(th); });
        head.appendChild(trH);
        const max=Math.min(data.length,600);
        for(let i=0;i<max;i++){
            const r=data[i];
            const tr=document.createElement('tr');
            tr.className='row-'+r.type;
            const isM=r.type==='missing';
            const nc=isM?'col-strike':'';
            const uc=isM?'col-strike':'col-new';
            const sc=isM?'col-strike':'col-new';
            const gc=isM?'col-strike':'';
            const sm={matched:'تطبیق',noinfo:'بدون اطلاعات',missing:'فاقد تردد'};
            const bm={matched:'badge-green',noinfo:'badge-yellow',missing:'badge-red'};
            tr.innerHTML='<td style="text-align:center;color:var(--muted);font-family:monospace;font-size:12px">'+(i+1)+'</td>'+
                '<td class="'+gc+'">'+r.gate+'</td>'+
                '<td class="'+nc+'">'+r.name+'</td>'+
                '<td style="font-family:monospace;font-weight:700;color:var(--fg)">'+r.code+'</td>'+
                '<td class="'+uc+'">'+r.unit+'</td>'+
                '<td class="'+sc+'">'+r.sub+'</td>'+
                '<td><span class="badge '+bm[r.type]+'">'+sm[r.type]+'</span></td>';
            body.appendChild(tr);
        }
        if(data.length>max){
            const tr=document.createElement('tr'); tr.style.opacity='1';
            tr.innerHTML='<td colspan="'+S.headers.length+'" style="text-align:center;padding:16px;color:var(--muted)"><i class="fas fa-ellipsis-h ml-2"></i> و '+(data.length-max)+' ردیف دیگر</td>';
            body.appendChild(tr);
        }
    }

    /* دانلود اکسل با خط قرمز واقعی */
    async function downloadExcel() {
        toast('در حال ساخت فایل اکسل...','info');
        try {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('گیت با محل فعالیت');
            ws.views = [{rightToLeft: true}];
            const headerRow = ws.addRow(S.headers);
            headerRow.eachCell(cell => {
                cell.font = {bold:true, color:{argb:'FFFFFFFF'}, size:12, name:'B Nazanin'};
                cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFF97316'}};
                cell.alignment = {horizontal:'right', vertical:'middle'};
                cell.border = thinBorder('FFF97316');
            });
            headerRow.height = 28;
            for(const r of S.merged) {
                const row = ws.addRow([
                    undefined, r.gate, r.name, r.code, r.unit, r.sub,
                    r.type==='matched'?'تطبیق':r.type==='noinfo'?'بدون اطلاعات':'فاقد تردد'
                ]);
                const isM = r.type==='missing';
                const isN = r.type==='noinfo';
                row.eachCell({includeEmpty:true}, (cell, colNumber) => {
                    cell.alignment = {horizontal:'right', vertical:'middle'};
                    cell.font = {size:11, name:'B Nazanin'};
                    if(isM){
                        cell.font = {size:11, name:'B Nazanin', strike:true, color:{argb:'FFEF4444'}};
                        cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'20FF0000'}};
                        cell.border = thinBorder('FFEF4444');
                    } else if(isN){
                        cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'18EAB308'}};
                        cell.border = thinBorder('FFEAB308');
                    } else {
                        cell.border = thinBorder('FF1E293B');
                        if(colNumber===5||colNumber===6){
                            cell.font = {size:11, name:'B Nazanin', bold:true, color:{argb:'FFF97316'}};
                        }
                    }
                });
            }
            ws.eachRow((row, rowNumber) => { if(rowNumber>1) row.getCell(1).value=rowNumber-1; });
            ws.getColumn(1).width=6; ws.getColumn(2).width=26; ws.getColumn(3).width=28;
            ws.getColumn(4).width=16; ws.getColumn(5).width=24; ws.getColumn(6).width=24; ws.getColumn(7).width=16;
            const buffer = await wb.xlsx.writeBuffer();
            const blob = new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download='گیت_با_محل_فعالیت.xlsx'; a.click();
            URL.revokeObjectURL(url);
            toast('فایل اکسل با موفقیت دانلود شد.','success');
        } catch(err){ console.error(err); toast('خطا در ساخت فایل: '+err.message,'error'); }
    }

    function thinBorder(color) {
        return {top:{style:'thin',color:{argb:color}},left:{style:'thin',color:{argb:color}},bottom:{style:'thin',color:{argb:color}},right:{style:'thin',color:{argb:color}}};
    }

    /* ریست */
    function resetAll() {
        S.rows1=[]; S.rows2=[]; S.cols1=[]; S.cols2=[]; S.merged=[]; S.headers=[]; S.name1=''; S.name2='';
        ['box1','box2'].forEach(id=>$(id).classList.remove('loaded'));
        $('ic1').className='fas fa-file-alt text-3xl mb-3 block'; $('ic1').style.opacity='.4';
        $('ic2').className='fas fa-door-open text-3xl mb-3 block'; $('ic2').style.opacity='.4';
        $('t1').textContent='کلیک یا بکشید و رها کنید'; $('s1').textContent='شامل: کدپرسنلی، نام، واحد، زیرمجموعه';
        $('t2').textContent='کلیک یا بکشید و رها کنید'; $('s2').textContent='شامل: گیت، نام، کدپرسنلی';
        $('file1').value=''; $('file2').value='';
        $('toStep2Btn').disabled=true;
    }

    /* کمکی */
    function clean(v){return String(v||'').replace(/[\u200c\u200d\u200e\u200f\ufeff]/g,'').trim()}
    function normD(s){const pd='۰۱۲۳۴۵۶۷۸۹',ad='٠١٢٣٤٥٦٧٨٩';let r=s;for(let i=0;i<10;i++)r=r.replace(new RegExp(pd[i],'g'),i).replace(new RegExp(ad[i],'g'),i);return r;}
    function bar(pct){$('topFill').style.width=pct+'%'}
    function toast(msg,type='info'){
        const icons={success:'fa-check-circle',error:'fa-exclamation-triangle',info:'fa-info-circle'};
        const colors={success:'var(--green)',error:'var(--red)',info:'var(--accent)'};
        const el=document.createElement('div');el.className='toast';
        el.innerHTML='<i class="fas '+icons[type]+'" style="color:'+colors[type]+';font-size:18px"></i><span>'+msg+'</span>';
        $('toastWrap').appendChild(el);setTimeout(()=>el.remove(),3100);
    }
    </script>
