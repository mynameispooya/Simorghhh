<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصال‌دهنده گیت به فایل مرجع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#090e0c;--bg2:#0f1714;--card:#14201b;--card2:#192b24;
            --accent:#2dd4a8;--accent-dim:rgba(45,212,168,.12);--accent-glow:rgba(45,212,168,.22);
            --warn:#f59e0b;--warn-dim:rgba(245,158,11,.12);
            --danger:#ef4444;--danger-dim:rgba(239,68,68,.12);
            --fg:#e8f0ec;--fg2:#b8c8c0;--muted:#5a756a;--border:#1e3229;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

        .bg-blob{position:fixed;border-radius:50%;filter:blur(150px);opacity:.1;pointer-events:none;z-index:0}
        .b1{width:600px;height:600px;background:var(--accent);top:-220px;left:-160px;animation:bf 24s ease-in-out infinite}
        .b2{width:400px;height:400px;background:#d4a82d;bottom:-120px;right:-100px;animation:bf 30s ease-in-out infinite reverse}
        .b3{width:280px;height:280px;background:#2d8cd4;top:45%;left:55%;animation:bf 20s ease-in-out infinite 4s}
        @keyframes bf{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-35px) scale(1.1)}66%{transform:translate(-35px,50px) scale(.92)}}

        .top-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:300;background:var(--border);overflow:hidden}
        .top-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7ee8c8);width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}

        .upload-box{border:2px dashed var(--border);border-radius:18px;padding:44px 28px;text-align:center;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;background:var(--bg2)}
        .upload-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--accent-glow),transparent 70%);opacity:0;transition:opacity .3s}
        .upload-box:hover,.upload-box.drag-over{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
        .upload-box:hover::before,.upload-box.drag-over::before{opacity:1}
        .upload-box.loaded{border-color:var(--accent);border-style:solid;background:rgba(45,212,168,.04)}
        .upload-box.loaded::before{opacity:.5}

        .stat-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;transition:transform .2s}
        .stat-pill:hover{transform:scale(1.03)}

        .merge-arrow{animation:arrowBounce 1.8s ease-in-out infinite}
        @keyframes arrowBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}

        .preview-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
        .preview-table thead th{background:rgba(45,212,168,.08);padding:11px 14px;text-align:right;font-weight:800;font-size:12px;color:var(--accent);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap}
        .preview-table tbody td{padding:10px 14px;border-bottom:1px solid rgba(30,50,41,.5);color:var(--fg2);transition:background .15s}
        .preview-table tbody tr:hover td{background:rgba(45,212,168,.03)}
        .preview-table .col-new{color:var(--accent);font-weight:700}
        .preview-table .col-miss{color:var(--danger);font-style:italic;opacity:.7}

        .btn-main{background:var(--accent);color:#091712;border:none;padding:12px 28px;border-radius:14px;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:10px}
        .btn-main:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow)}
        .btn-main:active{transform:translateY(0)}
        .btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none;box-shadow:none}
        .btn-sec{background:var(--card);color:var(--fg2);border:1px solid var(--border);padding:10px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:8px}
        .btn-sec:hover{border-color:var(--accent);color:var(--fg);transform:translateY(-1px)}

        .toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
        .toast{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:12px;font-size:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:tIn .35s ease,tOut .35s ease 2.6s forwards;pointer-events:all;backdrop-filter:blur(12px)}
        @keyframes tIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes tOut{from{opacity:1}to{transform:translateY(-20px);opacity:0}}

        .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .65s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}

        .fade-in{animation:fi .5s ease forwards}
        @keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .tab-btn{padding:10px 20px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
        .tab-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(45,212,168,.2)}
        .tab-btn:hover:not(.active){color:var(--fg2)}

        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

        @media(max-width:768px){
            .upload-grid{grid-template-columns:1fr!important}
            .arrow-col{transform:rotate(90deg)}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="top-bar"><div class="top-fill" id="topFill"></div></div>
    <div class="toast-wrap" id="toastWrap"></div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 py-10">

        <!-- هدر -->
        <header class="text-center mb-12">
            <div class="inline-flex items-center gap-4 mb-4">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),#1aa882);box-shadow:0 6px 24px var(--accent-glow)">
                    <i class="fas fa-link text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tight">اتصال‌دهنده گیت</h1>
            </div>
            <p class="text-base max-w-lg mx-auto" style="color:var(--muted)">
                ستون «گیت» از فایل دوم را بر اساس «کد پرسنلی» به فایل مرجع متصل کنید
            </p>
        </header>

        <!-- مرحله ۱: آپلود -->
        <section id="stepUpload">
            <div class="upload-grid grid gap-5 mb-6" style="grid-template-columns:1fr auto 1fr">
                <!-- فایل مرجع -->
                <div class="upload-box" id="box1" role="button" tabindex="0" aria-label="آپلود فایل مرجع">
                    <input type="file" id="file1" accept=".xlsx,.xls" class="hidden">
                    <div class="relative z-10">
                        <div class="mb-3">
                            <i class="fas fa-file-alt text-4xl" style="color:var(--accent);opacity:.5" id="icon1"></i>
                        </div>
                        <p class="font-extrabold text-sm mb-1" id="title1">فایل مرجع</p>
                        <p class="text-xs" style="color:var(--muted)" id="sub1">فایلی که ستون «کد پرسنلی» دارد</p>
                    </div>
                </div>
                <!-- فلش -->
                <div class="arrow-col flex items-center justify-center">
                    <i class="fas fa-arrow-left text-2xl merge-arrow" style="color:var(--accent);opacity:.4"></i>
                </div>
                <!-- فایل دوم -->
                <div class="upload-box" id="box2" role="button" tabindex="0" aria-label="آپلود فایل گیت">
                    <input type="file" id="file2" accept=".xlsx,.xls" class="hidden">
                    <div class="relative z-10">
                        <div class="mb-3">
                            <i class="fas fa-door-open text-4xl" style="color:var(--accent);opacity:.5" id="icon2"></i>
                        </div>
                        <p class="font-extrabold text-sm mb-1" id="title2">فایل گیت</p>
                        <p class="text-xs" style="color:var(--muted)" id="sub2">فایلی که ستون‌های «کد پرسنلی» و «گیت» دارد</p>
                    </div>
                </div>
            </div>
            <div class="flex justify-center">
                <button class="btn-main" id="mergeBtn" disabled>
                    <i class="fas fa-code-merge"></i>
                    اتصال و پیش‌نمایش
                </button>
            </div>
        </section>

        <!-- لودینگ -->
        <section id="stepLoading" class="hidden text-center py-24">
            <div class="spinner mx-auto mb-5"></div>
            <p class="font-semibold" style="color:var(--muted)">در حال اتصال فایل‌ها...</p>
        </section>

        <!-- مرحله ۲: نتایج -->
        <section id="stepResult" class="hidden fade-in">
            <!-- آمار -->
            <div class="flex flex-wrap items-center justify-center gap-3 mb-8" id="statsBar"></div>

            <!-- تب‌ها -->
            <div class="flex items-center gap-2 mb-4 overflow-x-auto pb-2" id="tabsBar"></div>

            <!-- جدول پیش‌نمایش -->
            <div class="rounded-2xl overflow-hidden" style="border:1px solid var(--border);background:var(--card)">
                <div class="overflow-auto" style="max-height:55vh" id="previewWrap">
                    <table class="preview-table" id="previewTable">
                        <thead id="pHead"></thead>
                        <tbody id="pBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- دکمه‌ها -->
            <div class="flex flex-wrap items-center justify-center gap-4 mt-8">
                <button class="btn-main" id="dlBtn">
                    <i class="fas fa-download"></i>
                    دانلود فایل مرجع با ستون گیت
                </button>
                <button class="btn-sec" id="backBtn">
                    <i class="fas fa-redo-alt"></i>
                    شروع مجدد
                </button>
            </div>
        </section>
    </div>

    <script>
    /* ============================
       حالت برنامه
    ============================ */
    const S = {
        f1Raw: null,   // آرایه خام فایل ۱
        f2Raw: null,   // آرایه خام فایل ۲
        f1Name: '',
        f2Name: '',
        f1CodeCol: -1,
        f2CodeCol: -1,
        f2GateCol: -1,
        f1HeaderRow: -1,
        f2HeaderRow: -1,
        gateMap: {},     // { "کدپرسنلی": "نام_گیت" }
        merged: [],      // آرایه نهایی (هدر + ردیف‌ها)
        allSheetNames1: [],
        allSheetNames2: [],
        selSheet1: 0,
        selSheet2: 0
    };

    const $ = id => document.getElementById(id);

    /* ============================
       آپلود فایل‌ها
    ============================ */
    function setupUpload(boxId, fileId, idx) {
        const box = $(boxId), inp = $(fileId);
        box.addEventListener('click', () => inp.click());
        box.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); inp.click(); } });
        box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('drag-over'); });
        box.addEventListener('dragleave', () => box.classList.remove('drag-over'));
        box.addEventListener('drop', e => {
            e.preventDefault(); box.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0], idx);
        });
        inp.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0], idx); });
    }
    setupUpload('box1', 'file1', 1);
    setupUpload('box2', 'file2', 2);

    function loadFile(file, idx) {
        if (!/\.xlsx?$/i.test(file.name)) { toast('فقط فرمت .xlsx یا .xls پشتیبانی می‌شود.', 'error'); return; }
        bar(20);
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                if (idx === 1) {
                    S.f1Raw = data; S.f1Name = file.name;
                    S.allSheetNames1 = wb.SheetNames; S.selSheet1 = 0;
                    markLoaded(1, file.name, wb.SheetNames.length);
                } else {
                    S.f2Raw = data; S.f2Name = file.name;
                    S.allSheetNames2 = wb.SheetNames; S.selSheet2 = 0;
                    markLoaded(2, file.name, wb.SheetNames.length);
                }
                bar(0);
                checkReady();
            } catch (err) {
                toast('خطا در خواندن فایل: ' + err.message, 'error');
                bar(0);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function markLoaded(idx, name, sheetCount) {
        const box = $(idx === 1 ? 'box1' : 'box2');
        const icon = $(idx === 1 ? 'icon1' : 'icon2');
        const title = $(idx === 1 ? 'title1' : 'title2');
        const sub = $(idx === 1 ? 'sub1' : 'sub2');
        box.classList.add('loaded');
        icon.className = 'fas fa-check-circle text-4xl';
        icon.style.color = 'var(--accent)'; icon.style.opacity = '1';
        title.textContent = name;
        sub.textContent = `${sheetCount} شیت شناسایی شد`;
    }

    function checkReady() {
        $('mergeBtn').disabled = !(S.f1Raw && S.f2Raw);
    }

    /* ============================
       دکمه اتصال
    ============================ */
    $('mergeBtn').addEventListener('click', doMerge);

    function doMerge() {
        show('stepLoading');
        bar(30);
        // استفاده از setTimeout تا UI آپدیت شود
        setTimeout(() => {
            try {
                bar(50);
                parseFiles();
                bar(70);
                buildGateMap();
                bar(85);
                buildMerged();
                bar(95);
                renderResult();
                bar(100);
                setTimeout(() => bar(0), 500);
                show('stepResult');
                toast('فایل‌ها با موفقیت متصل شدند.', 'success');
            } catch (err) {
                console.error(err);
                toast('خطا: ' + err.message, 'error');
                bar(0);
                show('stepUpload');
            }
        }, 80);
    }

    /* ============================
       پارس کردن هر دو فایل
    ============================ */
    function parseFiles() {
        // فایل ۱ (مرجع)
        const wb1 = XLSX.read(S.f1Raw, { type: 'array' });
        const s1 = wb1.Sheets[wb1.SheetNames[S.selSheet1]];
        const rows1 = XLSX.utils.sheet_to_json(s1, { header: 1, defval: '' });
        const r1 = findCol(rows1, ['کدپرسنلی', 'کد پرسنلی', 'کد پرسنل']);
        S.f1HeaderRow = r1.headerRow;
        S.f1CodeCol = r1.col;
        if (S.f1CodeCol < 0) throw new Error('ستون «کدپرسنلی» در فایل مرجع یافت نشد.');
        S._rows1 = rows1;

        // فایل ۲ (گیت)
        const wb2 = XLSX.read(S.f2Raw, { type: 'array' });
        const s2 = wb2.Sheets[wb2.SheetNames[S.selSheet2]];
        const rows2 = XLSX.utils.sheet_to_json(s2, { header: 1, defval: '' });
        const r2c = findCol(rows2, ['کدپرسنلی', 'کد پرسنلی', 'کد پرسنل']);
        S.f2HeaderRow = r2c.headerRow;
        S.f2CodeCol = r2c.col;
        if (S.f2CodeCol < 0) throw new Error('ستون «کد پرسنلی» در فایل گیت یافت نشد.');

        const r2g = findCol(rows2, ['گیت'], S.f2HeaderRow);
        S.f2GateCol = r2g.col;
        if (S.f2GateCol < 0) throw new Error('ستون «گیت» در فایل گیت یافت نشد.');
        S._rows2 = rows2;
    }

    // جستجوی ستون با نام‌های ممکن
    function findCol(rows, names, hintRow) {
        const limit = Math.min(rows.length, 30);
        const startR = hintRow !== undefined ? Math.max(0, hintRow - 3) : 0;
        const endR = hintRow !== undefined ? Math.min(limit, hintRow + 3) : limit;
        // ابتدا در محدوده hints جستجو
        for (let i = startR; i < endR; i++) {
            const row = rows[i] || [];
            for (let j = 0; j < row.length; j++) {
                const c = clean(row[j]);
                for (const n of names) { if (c.includes(n)) return { col: j, headerRow: i }; }
            }
        }
        // سپس کل محدوده
        for (let i = 0; i < limit; i++) {
            const row = rows[i] || [];
            for (let j = 0; j < row.length; j++) {
                const c = clean(row[j]);
                for (const n of names) { if (c.includes(n)) return { col: j, headerRow: i }; }
            }
        }
        return { col: -1, headerRow: -1 };
    }

    /* ============================
       ساخت نقشه گیت
    ============================ */
    function buildGateMap() {
        S.gateMap = {};
        const dataStart = S.f2HeaderRow + 1;
        for (let i = dataStart; i < S._rows2.length; i++) {
            const row = S._rows2[i] || [];
            const code = normDigits(clean(row[S.f2CodeCol]));
            const gate = clean(row[S.f2GateCol]);
            if (code && gate && gate !== '*') {
                S.gateMap[code] = gate;
            }
        }
    }

    /* ============================
       ساخت جدول ادغام‌شده
    ============================ */
    function buildMerged() {
        const rows = S._rows1;
        const hr = S.f1HeaderRow;
        S.merged = [];

        // ردیف‌های قبل از هدر: کپی مستقیم
        for (let i = 0; i < hr; i++) {
            S.merged.push([...(rows[i] || [])]);
        }

        // ردیف هدر: اضافه کردن ستون گیت
        const headerRow = [...(rows[hr] || [])];
        // پیدا کردن آخرین ستون غیرخالی برای قرار دادن گیت کنارش
        let lastCol = headerRow.length - 1;
        while (lastCol >= 0 && !clean(headerRow[lastCol])) lastCol--;
        const insertAt = lastCol + 1;
        // اگر خانه‌های خالی بین آخرین ستون و insertAt وجود دارد، پر می‌کنیم
        while (headerRow.length <= insertAt) headerRow.push('');
        headerRow[insertAt] = 'گیت';
        S.merged.push(headerRow);
        S._gateColIdx = insertAt;

        // ردیف‌های داده
        let matched = 0, missed = 0;
        for (let i = hr + 1; i < rows.length; i++) {
            const row = [...(rows[i] || [])];
            const code = normDigits(clean(row[S.f1CodeCol]));
            while (row.length <= insertAt) row.push('');
            if (code && S.gateMap[code]) {
                row[insertAt] = S.gateMap[code];
                matched++;
            } else if (code) {
                row[insertAt] = '—';
                missed++;
            }
            S.merged.push(row);
        }
        S._matched = matched;
        S._missed = missed;
        S._total = matched + missed;
    }

    /* ============================
       رندر نتایج
    ============================ */
    function renderResult() {
        // آمار
        $('statsBar').innerHTML = `
            <div class="stat-pill" style="background:var(--accent-dim);color:var(--accent)">
                <i class="fas fa-check-circle"></i> تطبیق: ${S._matched}
            </div>
            <div class="stat-pill" style="background:${S._missed ? 'var(--warn-dim)' : 'var(--accent-dim)'};color:${S._missed ? 'var(--warn)' : 'var(--accent)'}">
                <i class="fas fa-exclamation-circle"></i> بدون گیت: ${S._missed}
            </div>
            <div class="stat-pill" style="background:var(--accent-dim);color:var(--fg2)">
                <i class="fas fa-list"></i> کل ردیف‌ها: ${S._total}
            </div>
        `;

        // تب‌های شیت
        renderTabs();

        // جدول
        renderTable(S.merged);
    }

    function renderTabs() {
        const bar = $('tabsBar');
        bar.innerHTML = '';
        if (S.allSheetNames1.length <= 1 && S.allSheetNames2.length <= 1) return;

        const wrap = document.createElement('div');
        wrap.className = 'flex items-center gap-1 text-xs';
        wrap.style.color = 'var(--muted)';

        if (S.allSheetNames1.length > 1) {
            wrap.innerHTML += `<span class="ml-2">شیت مرجع:</span>`;
            S.allSheetNames1.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === S.selSheet1 ? ' active' : '');
                btn.textContent = name;
                btn.addEventListener('click', () => { S.selSheet1 = i; reParse(); });
                wrap.appendChild(btn);
            });
        }
        if (S.allSheetNames2.length > 1) {
            wrap.innerHTML += `<span class="mx-3" style="color:var(--border)">|</span><span class="ml-2">شیت گیت:</span>`;
            S.allSheetNames2.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === S.selSheet2 ? ' active' : '');
                btn.textContent = name;
                btn.addEventListener('click', () => { S.selSheet2 = i; reParse(); });
                wrap.appendChild(btn);
            });
        }
        bar.appendChild(wrap);
    }

    function reParse() {
        try {
            parseFiles();
            buildGateMap();
            buildMerged();
            renderResult();
        } catch (err) {
            toast('خطا: ' + err.message, 'error');
        }
    }

    function renderTable(data) {
        const head = $('pHead');
        const body = $('pBody');
        head.innerHTML = '';
        body.innerHTML = '';

        if (!data.length) return;

        const hr = S.f1HeaderRow;
        const gc = S._gateColIdx;

        // هدر
        const headerData = data[hr] || [];
        let trH = document.createElement('tr');
        headerData.forEach((cell, ci) => {
            const th = document.createElement('th');
            th.textContent = clean(cell);
            if (ci === gc) {
                th.style.background = 'rgba(45,212,168,.15)';
                th.innerHTML = `<i class="fas fa-plus-circle ml-1 text-xs"></i>` + clean(cell);
            }
            trH.appendChild(th);
        });
        // شماره ردیف
        const thNum = document.createElement('th');
        thNum.textContent = '#';
        thNum.style.width = '44px';
        trH.insertBefore(thNum, trH.firstChild);
        head.appendChild(trH);

        // بدنه (حداکثر ۵۰۰ ردیف برای عملکرد)
        const dataRows = data.slice(hr + 1);
        const maxShow = Math.min(dataRows.length, 500);
        for (let i = 0; i < maxShow; i++) {
            const row = dataRows[i] || [];
            const tr = document.createElement('tr');
            // شماره
            const tdN = document.createElement('td');
            tdN.textContent = i + 1;
            tdN.style.color = 'var(--muted)';
            tdN.style.textAlign = 'center';
            tdN.style.fontFamily = 'monospace';
            tdN.style.fontSize = '12px';
            tr.appendChild(tdN);
            // سلول‌ها
            for (let ci = 0; ci < headerData.length; ci++) {
                const td = document.createElement('td');
                const val = clean(row[ci] || '');
                td.textContent = val;
                if (ci === gc) {
                    if (val === '—') {
                        td.className = 'col-miss';
                    } else {
                        td.className = 'col-new';
                    }
                }
                tr.appendChild(td);
            }
            body.appendChild(tr);
        }

        if (dataRows.length > maxShow) {
            const tr = document.createElement('tr');
            tr.style.opacity = '1';
            const td = document.createElement('td');
            td.colSpan = headerData.length + 1;
            td.className = 'text-center py-4';
            td.style.color = 'var(--muted)';
            td.innerHTML = `<i class="fas fa-ellipsis-h ml-2"></i> و ${dataRows.length - maxShow} ردیف دیگر (در فایل دانلود کامل موجود است)`;
            tr.appendChild(td);
            body.appendChild(tr);
        }
    }

    /* ============================
       دانلود فایل نهایی
    ============================ */
    $('dlBtn').addEventListener('click', () => {
        const ws = XLSX.utils.aoa_to_sheet(S.merged);
        // تنظیم عرض ستون‌ها
        const maxCols = Math.max(...S.merged.map(r => r.length));
        ws['!cols'] = Array.from({ length: maxCols }, () => ({ wch: 18 }));
        if (S._gateColIdx >= 0) ws['!cols'][S._gateColIdx] = { wch: 28 };
        if (!ws['!sheetViews']) ws['!sheetViews'] = [{}];
        ws['!sheetViews'][0].rightToLeft = true;
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'مرجع_با_گیت');
        XLSX.writeFile(wb, 'مرجع_با_گیت_' + S.f1Name);
        toast('فایل با موفقیت دانلود شد.', 'success');
    });

    /* ============================
       ریست
    ============================ */
    $('backBtn').addEventListener('click', () => {
        S.f1Raw = null; S.f2Raw = null;
        S.f1Name = ''; S.f2Name = '';
        S.gateMap = {}; S.merged = [];
        S.allSheetNames1 = []; S.allSheetNames2 = [];
        S.selSheet1 = 0; S.selSheet2 = 0;
        ['box1','box2'].forEach(id => $(id).classList.remove('loaded'));
        $('icon1').className = 'fas fa-file-alt text-4xl'; $('icon1').style.opacity = '.5';
        $('icon2').className = 'fas fa-door-open text-4xl'; $('icon2').style.opacity = '.5';
        $('title1').textContent = 'فایل مرجع'; $('sub1').textContent = 'فایلی که ستون «کد پرسنلی» دارد';
        $('title2').textContent = 'فایل گیت'; $('sub2').textContent = 'فایلی که ستون‌های «کد پرسنلی» و «گیت» دارد';
        $('file1').value = ''; $('file2').value = '';
        $('mergeBtn').disabled = true;
        show('stepUpload');
    });

    /* ============================
       توابع کمکی
    ============================ */
    function clean(v) {
        return String(v || '').replace(/[\u200c\u200d\u200e\u200f\ufeff]/g, '').trim();
    }

    function normDigits(s) {
        const pd = '۰۱۲۳۴۵۶۷۸۹', ad = '٠١٢٣٤٥٦٧٨٩';
        let r = s;
        for (let i = 0; i < 10; i++) r = r.replace(new RegExp(pd[i], 'g'), i).replace(new RegExp(ad[i], 'g'), i);
        return r;
    }

    function show(id) {
        ['stepUpload','stepLoading','stepResult'].forEach(s => $(s).classList.toggle('hidden', s !== id));
    }

    function bar(pct) { $('topFill').style.width = pct + '%'; }

    function toast(msg, type = 'info') {
        const icons = { success:'fa-check-circle', error:'fa-exclamation-triangle', info:'fa-info-circle' };
        const colors = { success:'var(--accent)', error:'var(--danger)', info:'var(--accent)' };
        const el = document.createElement('div');
        el.className = 'toast';
        el.innerHTML = `<i class="fas ${icons[type]}" style="color:${colors[type]};font-size:18px"></i><span>${msg}</span>`;
        $('toastWrap').appendChild(el);
        setTimeout(() => el.remove(), 3100);
    }
    </script>
</body>
</html>
